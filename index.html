<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لعبة الجمع المرحة | للأطفال 4-5 سنوات</title>
<style>
  :root{
    --bg1:#fef3c7; --bg2:#fde68a; --card:#ffffff;
    --pink:#ff6b9d; --purple:#a78bfa; --blue:#38bdf8;
    --green:#34d399; --orange:#fb923c; --red:#f87171;
    --ink:#3b2f63; --shadow:0 10px 0 rgba(0,0,0,.12);
    --round:26px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    font-family:"Comic Sans MS","Baloo 2","Tahoma",system-ui,sans-serif;
    background:radial-gradient(circle at 20% 10%, #fff7ed 0%, var(--bg1) 40%, var(--bg2) 100%);
    color:var(--ink);
    min-height:100%;
    display:flex; flex-direction:column; align-items:center;
    overflow-x:hidden;
    user-select:none;
  }

  /* floating background blobs */
  .blob{position:fixed; border-radius:50%; filter:blur(2px); opacity:.35; z-index:0; animation:float 6s ease-in-out infinite;}
  .blob.b1{width:120px;height:120px;background:var(--pink);top:8%;left:6%;}
  .blob.b2{width:90px;height:90px;background:var(--blue);top:20%;right:8%;animation-delay:1s;}
  .blob.b3{width:140px;height:140px;background:var(--purple);bottom:10%;left:10%;animation-delay:2s;}
  .blob.b4{width:80px;height:80px;background:var(--green);bottom:18%;right:12%;animation-delay:.5s;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-24px)}}

  .game{
    position:relative; z-index:1;
    width:min(680px, 94vw);
    margin:18px auto 40px;
    text-align:center;
  }

  .title{
    font-size:clamp(28px,7vw,46px);
    margin:6px 0 2px;
    color:var(--purple);
    text-shadow:2px 3px 0 #fff, 4px 6px 0 rgba(167,139,250,.3);
    letter-spacing:1px;
  }
  .title .emoji{font-size:1.1em;}

  /* score + stars bar */
  .topbar{
    display:flex; justify-content:center; gap:10px; flex-wrap:wrap;
    margin:10px 0 4px;
  }
  .chip{
    background:var(--card); border-radius:999px;
    padding:8px 16px; font-size:20px; font-weight:bold;
    box-shadow:0 5px 0 rgba(0,0,0,.10);
    display:flex; align-items:center; gap:6px;
  }
  .stars{font-size:22px; letter-spacing:2px;}

  /* main play card */
  .card{
    background:var(--card);
    border-radius:var(--round);
    padding:22px 18px 26px;
    box-shadow:var(--shadow);
    margin-top:12px;
    border:6px solid #fff;
    outline:4px solid rgba(167,139,250,.25);
  }

  .question-label{
    font-size:22px; color:var(--orange); font-weight:bold; margin:0 0 10px;
  }

  /* the visual counting groups */
  .equation{
    display:flex; align-items:center; justify-content:center;
    gap:8px; flex-wrap:wrap; margin:8px 0 14px;
  }
  .group{
    background:linear-gradient(180deg,#fff,#f3f4ff);
    border:4px dashed var(--purple);
    border-radius:20px;
    padding:12px;
    min-width:96px;
    display:flex; flex-wrap:wrap; gap:6px; justify-content:center; align-items:center;
  }
  .group.g2{border-color:var(--blue);}
  .item{
    font-size:clamp(26px,7vw,40px);
    line-height:1;
    animation:pop .4s ease both;
    cursor:pointer;
  }
  .item:active{transform:scale(1.3) rotate(10deg);}
  @keyframes pop{0%{transform:scale(0) rotate(-40deg);opacity:0}70%{transform:scale(1.25)}100%{transform:scale(1)}}

  .op{font-size:clamp(34px,9vw,54px); font-weight:bold; color:var(--pink);}
  .num-badge{
    font-size:clamp(30px,8vw,48px); font-weight:bold;
    background:var(--orange); color:#fff;
    width:1.7em; height:1.7em; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center;
    box-shadow:0 5px 0 rgba(0,0,0,.15);
  }
  .num-badge.b1{background:var(--green);}
  .num-badge.b2{background:var(--blue);}

  .hint{font-size:17px; color:#9aa0b5; margin:6px 0 14px;}

  /* answer choices */
  .choices{
    display:grid; grid-template-columns:repeat(3,1fr); gap:14px;
    margin-top:6px;
  }
  @media(max-width:420px){.choices{grid-template-columns:repeat(2,1fr);}}
  .choice{
    font-family:inherit;
    font-size:clamp(30px,8vw,44px); font-weight:bold; color:#fff;
    border:none; border-radius:22px;
    padding:18px 0;
    cursor:pointer;
    box-shadow:0 7px 0 rgba(0,0,0,.18);
    transition:transform .08s, box-shadow .08s;
  }
  .choice:active{transform:translateY(5px); box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .choice:nth-child(1){background:var(--pink);}
  .choice:nth-child(2){background:var(--blue);}
  .choice:nth-child(3){background:var(--green);}
  .choice:nth-child(4){background:var(--orange);}
  .choice.wrong{background:#cbd5e1 !important; animation:shake .4s;}
  .choice.right{animation:rightPulse .6s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  @keyframes rightPulse{0%{transform:scale(1)}40%{transform:scale(1.25)}100%{transform:scale(1)}}

  /* feedback banner */
  .feedback{
    min-height:42px; margin:16px 0 4px;
    font-size:26px; font-weight:bold;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .feedback.good{color:var(--green);}
  .feedback.try{color:var(--orange);}

  .next-btn{
    font-family:inherit; font-size:24px; font-weight:bold; color:#fff;
    background:var(--purple); border:none; border-radius:18px;
    padding:14px 30px; cursor:pointer; box-shadow:0 6px 0 rgba(0,0,0,.2);
    display:none; margin:4px auto 0;
  }
  .next-btn:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.2);}

  .controls{margin-top:18px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
  .mini{
    font-family:inherit; font-size:16px; font-weight:bold;
    background:#fff; color:var(--purple);
    border:3px solid var(--purple); border-radius:14px;
    padding:8px 16px; cursor:pointer;
  }
  .mini:active{transform:translateY(2px);}

  /* confetti */
  .confetti{position:fixed; top:-20px; font-size:24px; z-index:50; pointer-events:none; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg); opacity:.9;}}

  /* win overlay */
  .overlay{
    position:fixed; inset:0; background:rgba(59,47,99,.85);
    display:none; align-items:center; justify-content:center; z-index:100;
  }
  .overlay.show{display:flex;}
  .win-card{
    background:var(--card); border-radius:30px; padding:36px 28px;
    text-align:center; box-shadow:var(--shadow); width:min(420px,90vw);
    animation:pop .5s ease both;
  }
  .win-card h2{font-size:38px; color:var(--pink); margin:6px 0;}
  .win-card .trophy{font-size:80px; animation:float 2s ease-in-out infinite;}
  .win-card p{font-size:22px; color:var(--ink);}
  .play-again{
    font-family:inherit; font-size:24px; font-weight:bold; color:#fff;
    background:var(--green); border:none; border-radius:18px;
    padding:14px 32px; cursor:pointer; box-shadow:0 6px 0 rgba(0,0,0,.2); margin-top:10px;
  }
  .play-again:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.2);}
</style>
</head>
<body>
  <div class="blob b1"></div><div class="blob b2"></div>
  <div class="blob b3"></div><div class="blob b4"></div>

  <div class="game">
    <h1 class="title"><span class="emoji">🧮</span> لعبة الجمع المرحة <span class="emoji">🎈</span></h1>

    <div class="topbar">
      <div class="chip">⭐ <span id="score">0</span> نقاط</div>
      <div class="chip">السؤال <span id="qnum">1</span>/<span id="qtotal">10</span></div>
      <div class="chip stars" id="streak">😀</div>
    </div>

    <div class="card">
      <p class="question-label">كم العدد كله؟ عُدّ الأشياء! 👇</p>

      <div class="equation">
        <div class="group g1" id="group1"></div>
        <span class="op">+</span>
        <div class="group g2" id="group2"></div>
        <span class="op">=</span>
        <span class="num-badge" id="qmark">؟</span>
      </div>

      <div class="equation" style="margin-top:-4px">
        <span class="num-badge b1" id="numA">0</span>
        <span class="op">+</span>
        <span class="num-badge b2" id="numB">0</span>
      </div>

      <p class="hint">المس الأشياء لتعدّها بصوت عالٍ! 🔊</p>

      <div class="choices" id="choices"></div>

      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn">السؤال التالي ➡️</button>
    </div>

    <div class="controls">
      <button class="mini" id="readBtn">🔊 اسمع السؤال</button>
      <button class="mini" id="restartBtn">🔄 من البداية</button>
    </div>
  </div>

  <!-- Win overlay -->
  <div class="overlay" id="overlay">
    <div class="win-card">
      <div class="trophy">🏆</div>
      <h2>أحسنت! 🎉</h2>
      <p id="winText">لقد جمعت ⭐ 0 نقاط!</p>
      <button class="play-again" id="playAgain">العب مرة أخرى 🚀</button>
    </div>
  </div>

<script>
(function(){
  // ---- fun emoji "things" to count ----
  const ICONS = ["🍎","🍓","🐤","🐞","🌟","🎈","🍭","🐸","🚗","🌸","🦋","🍪","⚽","🐠","🧸"];
  const CHEERS = ["رائع! 🌟","ممتاز! 🎉","أحسنت! 👏","عبقري! 🧠","صحّ! ✅","بطل! 🦸"];
  const TRIES  = ["جرّب مرة أخرى 💪","عُدّ من جديد 🔢","قريب جداً! 🙂"];

  const TOTAL = 10;
  let qIndex = 0, score = 0, answered = false, current = null;

  const $ = id => document.getElementById(id);
  const g1 = $("group1"), g2 = $("group2"), choicesEl = $("choices");

  // ---- speech (Arabic if available) ----
  function speak(text){
    if(!("speechSynthesis" in window)) return;
    try{
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ar-SA"; u.rate = .9; u.pitch = 1.2;
      const ar = speechSynthesis.getVoices().find(v=>/ar/i.test(v.lang));
      if(ar) u.voice = ar;
      speechSynthesis.speak(u);
    }catch(e){}
  }
  // simple beep using WebAudio for taps
  let actx=null;
  function tone(freq, dur, type){
    try{
      actx = actx || new (window.AudioContext||window.webkitAudioContext)();
      const o=actx.createOscillator(), gn=actx.createGain();
      o.type=type||"sine"; o.frequency.value=freq;
      o.connect(gn); gn.connect(actx.destination);
      gn.gain.setValueAtTime(.001, actx.currentTime);
      gn.gain.exponentialRampToValueAtTime(.25, actx.currentTime+.02);
      gn.gain.exponentialRampToValueAtTime(.001, actx.currentTime+dur);
      o.start(); o.stop(actx.currentTime+dur);
    }catch(e){}
  }
  function happySound(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,.18,"triangle"),i*110)); }
  function buzzSound(){ tone(180,.25,"sawtooth"); }

  function rnd(n){ return Math.floor(Math.random()*n); }

  function makeQuestion(){
    answered = false;
    // keep sums small & friendly for ages 4-5 (max 10)
    const a = 1 + rnd(5);            // 1..5
    const b = 1 + rnd(Math.min(5, 10-a)); // ensure a+b <= 10
    const sum = a + b;
    const icon = ICONS[rnd(ICONS.length)];

    current = {a,b,sum,icon};

    // render counting groups
    g1.innerHTML=""; g2.innerHTML="";
    for(let i=0;i<a;i++) g1.appendChild(makeItem(icon, i));
    for(let i=0;i<b;i++) g2.appendChild(makeItem(icon, i));

    $("numA").textContent = a;
    $("numB").textContent = b;
    $("qmark").textContent = "؟";
    $("qnum").textContent = qIndex+1;

    // build 3 unique answer choices, one correct
    const opts = new Set([sum]);
    while(opts.size<3){
      let d = sum + (rnd(2)? 1:-1)*(1+rnd(3));
      if(d>=1 && d<=12) opts.add(d);
    }
    const arr = [...opts].sort(()=>Math.random()-.5);
    choicesEl.innerHTML="";
    arr.forEach(v=>{
      const btn=document.createElement("button");
      btn.className="choice"; btn.textContent=v;
      btn.onclick=()=>pick(btn, v);
      choicesEl.appendChild(btn);
    });

    $("feedback").textContent=""; $("feedback").className="feedback";
    $("nextBtn").style.display="none";
    speakQuestion();
  }

  function makeItem(icon, i){
    const s=document.createElement("span");
    s.className="item"; s.textContent=icon;
    s.style.animationDelay=(i*.08)+"s";
    s.onclick=()=>{ tone(660+ i*40,.12,"sine"); s.style.transform="scale(1.4) rotate(-12deg)"; setTimeout(()=>s.style.transform="",180); };
    return s;
  }

  function speakQuestion(){
    speak(`${current.a} زائد ${current.b}، كم يساوي؟`);
  }

  function pick(btn, value){
    if(answered) return;
    if(value === current.sum){
      answered = true;
      btn.classList.add("right");
      score += 10;
      $("score").textContent = score;
      $("qmark").textContent = current.sum;
      const msg = CHEERS[rnd(CHEERS.length)];
      const fb=$("feedback"); fb.textContent=msg; fb.className="feedback good";
      $("streak").textContent = "🤩";
      happySound(); speak(msg.replace(/[^؀-ۿ ]/g,""));
      confettiBurst();
      if(qIndex < TOTAL-1){
        $("nextBtn").style.display="inline-block";
      }else{
        setTimeout(showWin, 900);
      }
    }else{
      btn.classList.add("wrong"); btn.disabled=true;
      const fb=$("feedback"); fb.textContent=TRIES[rnd(TRIES.length)]; fb.className="feedback try";
      $("streak").textContent="🤔";
      buzzSound();
    }
  }

  $("nextBtn").onclick = ()=>{ qIndex++; makeQuestion(); };
  $("readBtn").onclick = speakQuestion;
  $("restartBtn").onclick = restart;
  $("playAgain").onclick = ()=>{ $("overlay").classList.remove("show"); restart(); };

  function restart(){
    qIndex=0; score=0; $("score").textContent=0; $("streak").textContent="😀";
    makeQuestion();
  }

  function showWin(){
    let stars = score>=90?"⭐⭐⭐":score>=60?"⭐⭐":"⭐";
    $("winText").innerHTML = `حصلت على <b>${score}</b> نقطة!<br>${stars}`;
    $("overlay").classList.add("show");
    happySound();
    for(let i=0;i<5;i++) setTimeout(confettiBurst, i*250);
    speak(`أحسنت! حصلت على ${score} نقطة`);
  }

  function confettiBurst(){
    const chars=["🎉","⭐","🎊","🌟","🎈","✨"];
    for(let i=0;i<14;i++){
      const c=document.createElement("div");
      c.className="confetti"; c.textContent=chars[rnd(chars.length)];
      c.style.left=(Math.random()*100)+"vw";
      c.style.animationDuration=(1.6+Math.random()*1.4)+"s";
      c.style.fontSize=(18+Math.random()*22)+"px";
      document.body.appendChild(c);
      setTimeout(()=>c.remove(), 3200);
    }
  }

  $("qtotal").textContent = TOTAL;
  // voices may load async
  if("speechSynthesis" in window) speechSynthesis.onvoiceschanged = ()=>{};
  makeQuestion();
})();
</script>
</body>
</html>
